<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property of Friends - Buyer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1e2a5e;
            --navy-deep: #13204a;
            --orange: #f4a261;
            --orange-dark: #e76f51;
            --bg: #eef1f8;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1f2a44;
            --text-muted: #64748b;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "DM Sans", "Segoe UI", system-ui, sans-serif;
        }
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, rgba(36,59,138,0.06) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(244,162,97,0.06) 0%, transparent 50%);
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid #eef1f6;
        }
        .header {
            background: linear-gradient(135deg, var(--navy-deep), var(--navy));
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: "Fraunces", Georgia, serif;
            letter-spacing: -0.3px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 0.35rem 1rem 0.35rem 0.6rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.18);
            display: flex;
            align-items: center;
            gap: 0;
        }
        .nav-buttons {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.88);
            padding: 0.45rem 1rem;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .nav-btn:hover, .nav-btn.active {
            background: var(--orange);
            color: var(--navy);
            border-color: var(--orange);
            transform: none;
        }
        .logout-btn {
            background: #ef4444 !important;
        }
        .logout-btn:hover {
            background: #dc2626 !important;
            color: white !important;
        }
        .main-content {
            padding: 2rem;
            background: #f9fafc;
            min-height: 600px;
        }
        #pageContainer {
            min-height: 500px;
        }
        .login-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .login-left {
            flex: 1;
            background: linear-gradient(145deg, #0a2e1a 0%, #0f4a2a 40%, #1a7a4a 100%);
            color: white;
            padding: 3rem 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(46,204,113,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(22,163,74,0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        .login-left::after {
            content: '';
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.06);
            bottom: -100px;
            right: -80px;
            pointer-events: none;
        }
        .login-left-inner {
            position: relative;
            z-index: 1;
        }
        .login-left-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            padding: 0.35rem 1rem;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
        }
        .login-left-dots {
            display: flex;
            gap: 0.5rem;
            margin-top: 2.5rem;
        }
        .login-left-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
        }
        .login-left-dots span:first-child {
            background: rgba(255,255,255,0.7);
            width: 24px;
            border-radius: 4px;
        }
        .login-left h1 {
            font-size: 2.6rem;
            font-weight: 700;
            font-family: "Fraunces", Georgia, serif;
            margin-bottom: 1rem;
            line-height: 1.12;
            letter-spacing: -0.5px;
        }
        .login-left p {
            font-size: 1rem;
            opacity: 0.75;
            line-height: 1.6;
            max-width: 320px;
        }
        .login-right {
            flex: 1;
            padding: 3rem 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fafffe;
            border-radius: 0;
            max-width: 480px;
        }
        .login-right-logo {
            font-family: "Fraunces", Georgia, serif;
            font-size: 0.85rem;
            color: #16a34a;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .login-right h2 {
            font-size: 1.9rem;
            margin-bottom: 0.4rem;
            color: #0a2e1a;
            font-family: "Fraunces", Georgia, serif;
            font-weight: 700;
            letter-spacing: -0.4px;
            border-bottom: none;
            padding-bottom: 0;
        }
        .login-right-sub {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }
        .login-form .form-group {
            margin-bottom: 1.1rem;
        }
        .login-form label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.35rem;
            display: block;
        }
        .login-form input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #d1fae5;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: "DM Sans", sans-serif;
            background: #f0fdf4;
            color: #0a2e1a;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
        }
        .login-form input::placeholder {
            color: #9ca3af;
        }
        .login-form input:hover {
            border-color: #86efac;
            box-shadow: 0 4px 14px rgba(22,163,74,0.1);
            transform: translateY(-1px);
        }
        .login-form input:focus {
            outline: none;
            border-color: #16a34a;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.15), 0 4px 16px rgba(22,163,74,0.12);
            transform: translateY(-2px);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 4rem;
        }
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: transparent;
            border: none;
            color: #16a34a;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0;
            margin: 0;
            line-height: 1;
            height: auto;
            transition: color 0.15s;
        }
        .toggle-pwd:hover {
            background: transparent;
            color: #15803d;
            text-decoration: none;
            box-shadow: none;
            transform: none;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: #fff;
            padding: 0.9rem;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            border-radius: 14px;
            margin-top: 0.75rem;
            border: none;
            cursor: pointer;
            font-family: "DM Sans", sans-serif;
            box-shadow: 0 4px 18px rgba(22,163,74,0.35), 0 1px 4px rgba(22,163,74,0.2);
            transition: all 0.22s ease;
            position: relative;
            overflow: hidden;
        }
        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            border-radius: inherit;
            pointer-events: none;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #15803d, #16a34a);
            box-shadow: 0 6px 28px rgba(22,163,74,0.55), 0 0 40px rgba(34,197,94,0.25);
            transform: translateY(-2px);
            color: #fff;
        }
        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 3px 12px rgba(22,163,74,0.4);
        }
        .login-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            gap: 1rem;
        }
        .login-footer a {
            color: #16a34a;
            text-decoration: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.15s;
        }
        .login-footer a:hover {
            color: #15803d;
            text-decoration: underline;
        }
        /* ===== FULL-VIEWPORT LOGIN OVERRIDE ===== */
        body:has(.login-container) {
            padding: 0;
            align-items: stretch;
            background: #0a2e1a;
            height: 100vh;
            overflow: hidden;
        }
        body:has(.login-container) .container {
            max-width: none;
            width: 100%;
            height: 100vh;
            border-radius: 0;
            box-shadow: none;
            border: none;
            display: flex;
            flex-direction: column;
        }
        body:has(.login-container) .main-content {
            padding: 0;
            background: transparent;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        body:has(.login-container) #mainContent {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .login-container { flex-direction: column; overflow-y: auto; min-height: 100vh; height: auto; }
            .login-left, .login-right { border-radius: 0; }
            .main-content { padding: 1rem; }
            #pageContainer { min-height: auto; }
        }
        .card {
            background: white;
            border-radius: 18px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e8edf3;
            box-shadow: 0 4px 16px rgba(30,42,94,0.06), 0 1px 4px rgba(0,0,0,0.04);
            transition: box-shadow 0.2s ease;
            animation: cardIn 0.3s ease both;
        }
        .card:hover {
            box-shadow: 0 8px 28px rgba(30,42,94,0.1);
            transform: none;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        h2 {
            font-size: 1.35rem;
            margin-bottom: 1rem;
            color: var(--navy);
            font-family: "Fraunces", Georgia, serif;
            font-weight: 600;
            letter-spacing: -0.3px;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #f0f3f8;
        }
        h3 {
            font-size: 1rem;
            margin: 1rem 0;
            color: #2c3e66;
            font-family: "Fraunces", Georgia, serif;
            font-weight: 600;
        }
        form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #d6deea;
            border-radius: 12px;
            font-size: 0.9rem;
            background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: "DM Sans", sans-serif;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(244,162,97,0.18);
        }
        button {
            background: linear-gradient(135deg, #f4a261, #f6b27a);
            color: #1e2a5e;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover {
            background: linear-gradient(135deg, #e76f51, #f4a261);
            color: white;
            transform: none;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-secondary {
            background: #64748b;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #edf2f7;
            text-align: left;
            font-size: 0.875rem;
        }
        th {
            background: #f5f7fb;
            color: var(--navy);
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            white-space: nowrap;
        }
        tbody tr {
            transition: background 0.12s;
        }
        tbody tr:hover {
            background: #f8faff;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            margin-top: 1rem;
            border: 1px solid #edf2f7;
        }
        .table-wrapper table {
            border-radius: 0;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.22rem 0.65rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .badge-active    { background: #d1fae5; color: #065f46; }
        .badge-pending   { background: #fef3c7; color: #92400e; }
        .badge-rejected  { background: #fee2e2; color: #991b1b; }
        .badge-paid      { background: #dbeafe; color: #1e40af; }
        .badge-available { background: #d1fae5; color: #065f46; }
        .badge-reserved  { background: #ede9fe; color: #5b21b6; }
        .badge-sold      { background: #f3f4f6; color: #374151; }
        .badge-unknown   { background: #f3f4f6; color: #6b7280; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeInOut 3s ease forwards;
            pointer-events: none;
        }
        .toast.success {
            background: #10b981;
            color: white;
        }
        .toast.error {
            background: #ef4444;
            color: white;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); visibility: hidden; }
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 18px;
            padding: 1.8rem;
            width: 92%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        code { background: #e2e8f0; padding: 2px 6px; border-radius: 8px; }
        small { color: #6c7a91; }
    </style>
</head>
<body>
<div class="container" id="appContainer">
    <div class="header" id="header" style="display: none;">
        <div class="logo">
            <svg width="22" height="22" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:6px;">
                <rect width="28" height="28" rx="7" fill="#16a34a"/>
                <path d="M5 13.5L14 7L23 13.5V22H18.5V16.5H9.5V22H5V13.5Z" fill="white"/>
                <rect x="11" y="17.5" width="6" height="4.5" rx="1" fill="#16a34a" opacity="0.5"/>
                <rect x="7" y="14.5" width="4" height="3.5" rx="0.8" fill="white" opacity="0.55"/>
                <rect x="17" y="14.5" width="4" height="3.5" rx="0.8" fill="white" opacity="0.55"/>
            </svg>
            Property of Friends, Inc.
        </div>
        <div class="nav-buttons" id="navButtons"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>
<div id="globalModal" class="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
    function allowOnlyNumbersAndDecimal(event) {
        let val = event.target.value;
        val = val.replace(/[^0-9.]/g, '');
        let parts = val.split('.');
        if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
        event.target.value = val;
    }
    function attachNumericDecimal() {
        document.querySelectorAll('input[data-numeric-decimal="true"]').forEach(f => {
            f.removeEventListener('input', allowOnlyNumbersAndDecimal);
            f.addEventListener('input', allowOnlyNumbersAndDecimal);
        });
    }
    function allowOnlyDigits(event) {
        event.target.value = event.target.value.replace(/[^0-9]/g, '');
    }
    function attachNumeric() {
        document.querySelectorAll('input[data-numeric="true"]').forEach(f => {
            f.removeEventListener('input', allowOnlyDigits);
            f.addEventListener('input', allowOnlyDigits);
        });
    }

    // ============================================================
    // API wiring: helper that talks to the Flask backend.
    // Andre's render functions are unchanged; we only change where data comes from.
    // ============================================================
    const API = {
        async get(path) { const r = await fetch(path); return r.json(); },
        async send(method, path, body) {
            const r = await fetch(path, {
                method,
                headers: { "Content-Type": "application/json" },
                body: body ? JSON.stringify(body) : undefined,
            });
            return r.json();
        },
    };

    // API wiring: convert a DB row (DB column names) into the camelCase shape the
    // render functions read, and back (mapXToDb) for POST/PUT bodies.
    // DB schema confirmed from backend/routes/*.py + database/profriends_inc.sql.
    function mapBuyer(r) {
        return {
            buyerId: r.BuyerID, fullName: r.BuyerName, birthdate: r.Birthdate,
            birthplace: r.Birthplace, gender: r.Gender, civilStatus: r.Civil_Status,
            citizenship: r.Citizenship, grossMonthlyIncome: Number(r.Gross_MonthlyIncome) || 0,
            govID: r.GovID, tin: r.TIN, telNum: r.Tel_Num || "", mobileNum: r.Mobile_Num,
            personalEmail: r.Personal_Email, workEmail: r.Work_Email || "",
            bankName: r.Bank_Name, accountType: r.Account_Type,
            address: r.Address || ""   // DB-only column; kept so updates don't drop it
        };
    }
    function mapBuyerToDb(b) {
        return {
            BuyerID: b.buyerId, BuyerName: b.fullName, Birthdate: b.birthdate,
            Birthplace: b.birthplace, GovID: b.govID, TIN: b.tin, Gender: b.gender,
            Civil_Status: b.civilStatus,
            // Address is NOT NULL in the DB but the UI has no field for it; send a
            // placeholder on create so the INSERT succeeds, preserve it on edit.
            Address: b.address || "N/A",
            Citizenship: b.citizenship, Gross_MonthlyIncome: b.grossMonthlyIncome,
            Tel_Num: b.telNum, Mobile_Num: b.mobileNum, Personal_Email: b.personalEmail,
            Work_Email: b.workEmail, Account_Type: b.accountType, Bank_Name: b.bankName
        };
    }
    function mapSpouse(r) {
        return {
            buyerId: r.BuyerID, spsName: r.Sps_Name, spsBdate: r.Sps_Bdate,
            spsBplace: r.Sps_Bplace, spsCitizenship: r.Sps_Citizenship,
            spsGovID: r.Sps_GovID, spsTIN: r.Sps_TIN, spsTelNum: r.Sps_TelNum,
            spsMobNum: r.Sps_MobNum, spsEmailAdd: r.Sps_EmailAdd,
            spsGrossMonthlyIncome: Number(r.Sps_GrossMonthlyIncome) || 0
        };
    }
    function mapSpouseToDb(s) {
        return {
            BuyerID: s.buyerId, Sps_Name: s.spsName, Sps_Bdate: s.spsBdate,
            Sps_Bplace: s.spsBplace, Sps_Citizenship: s.spsCitizenship,
            Sps_GovID: s.spsGovID, Sps_TIN: s.spsTIN, Sps_TelNum: s.spsTelNum,
            Sps_EmailAdd: s.spsEmailAdd, Sps_MobNum: s.spsMobNum,
            Sps_GrossMonthlyIncome: s.spsGrossMonthlyIncome
        };
    }
    function mapEmployment(r) {
        return {
            employmentId: r.EmploymentID, buyerId: r.BuyerID, empType: r.Emp_Type,
            empName: r.Emp_Name, empAddress: r.Emp_Address, empTelNum: r.Emp_TelNum || "",
            empEmailAdd: r.Emp_EmailAdd || "", occupation: r.Occupation,
            position: r.Position, tenure: Number(r.Tenure) || 0,
            occupationRank: r.Occupation_rank || ""
        };
    }
    function mapEmploymentToDb(e) {
        return {

    // `status` field (Pending/Active/Rejected/Paid) for its workflow, so we keep

    function mapLoan(r) {

            loanId: r.LoanID, buyerId: r.BuyerID, unitId: r.UnitID,

    // API wiring: login now goes through POST /api/login instead of the in-memory
    // `users` array. The backend distinguishes admin vs buyer by an explicit `role`.
    // Buyer login: username = BuyerID (e.g. "B-2023-001"), password = buyer's last
    // name. Admin login: the ADMIN_USER / ADMIN_PASS configured in the backend .env.
    // We pick the role from the identifier shape: a BuyerID matches B-####-### .
    async function handleLogin(e) {
        e.preventDefault();
        const identifier = document.getElementById("loginIdentifier").value.trim();
        const pwd = document.getElementById("loginPassword").value;
        const role = /^B-\d{4}-\d{3}$/i.test(identifier) ? "buyer" : "admin";
        try {
            const res = await API.send("POST", "/api/login", {
                role, username: identifier, password: pwd
            });
            if (res && res.ok) {
                // The login response returns {role, name}. For buyers the BuyerID is
                // the username we just typed, so we stash it as buyerId for the
                // client dashboard pages (currentUser.buyerId is read everywhere).
                currentUser = {
                    role: res.data.role,
                    fullName: res.data.name,
                    buyerId: res.data.role === "buyer" ? identifier : null
                };
                // API wiring: load DB data BEFORE rendering the app so tables fill in.
                await loadAllData();
                showMessage(`Welcome, ${currentUser.fullName}!`, "success");
                renderApp();
            } else {
                showMessage((res && res.error) || "Invalid login", "error");
            }
        } catch (err) {
            showMessage("Could not reach the server. Please try again.", "error");
        }
    }

    async function handleCreateAccount(e) {
        e.preventDefault();
        const civil = document.getElementById("regCivilStatus").value;
        const newBuyerId = `B-${new Date().getFullYear()}-${String(buyers.length+1).padStart(3,"0")}`;
        const newBuyer = {
            buyerId: newBuyerId,
            fullName: document.getElementById("regFullName").value,
            birthdate: document.getElementById("regBirthdate").value,
            birthplace: document.getElementById("regBirthplace").value,
            gender: document.getElementById("regGender").value,
            civilStatus: civil,
            citizenship: document.getElementById("regCitizenship").value,
            grossMonthlyIncome: parseFloat(document.getElementById("regIncome").value || 0),
            govID: document.getElementById("regGovID").value,
            tin: document.getElementById("regTIN").value,
            telNum: document.getElementById("regTelNum").value,
            mobileNum: document.getElementById("regMobile").value,
            personalEmail: document.getElementById("regEmail").value,
            workEmail: document.getElementById("regWorkEmail").value,
            bankName: document.getElementById("regBankName").value,
            accountType: document.getElementById("regAccountType").value
        };
        if (!newBuyer.fullName || !newBuyer.birthdate || !newBuyer.mobileNum || !newBuyer.personalEmail || !newBuyer.grossMonthlyIncome) {
            showMessage("Please fill all required fields", "error");
            return;
        }
        // API wiring: create the buyer in the DB instead of pushing to the array.
        // Backend buyer login uses BuyerID + last name as the password, so the
        // separate `users` table / regUsername+regPassword fields have no API
        // counterpart and are intentionally dropped here.
        // NOTE: the buyer table requires Address (NOT NULL); the registration form
        // has no Address field, so mapBuyerToDb() sends "N/A" as a placeholder.
        const buyerRes = await API.send("POST", "/api/buyers", mapBuyerToDb(newBuyer));
        if (!buyerRes || !buyerRes.ok) {
            showMessage((buyerRes && buyerRes.error) || "Could not create buyer", "error");
            return;
        }
        if (civil === "M") {
            // API wiring: create spouse via API.
            const spouseObj = {
                buyerId: newBuyerId,
                spsName: document.getElementById("regSpouseName").value,
                spsBdate: document.getElementById("regSpouseBdate").value,
                spsBplace: document.getElementById("regSpouseBplace").value,
                spsCitizenship: document.getElementById("regSpouseCitizenship").value,
                spsGovID: document.getElementById("regSpouseGovID").value,
                spsTIN: document.getElementById("regSpouseTIN").value,
                spsTelNum: "",

                spsEmailAdd: document.getElementById("regSpouseEmail").value,
                spsGrossMonthlyIncome: parseFloat(document.getElementById("regSpouseIncome").value || 0)
            };
            await API.send("POST", "/api/spouse", mapSpouseToDb(spouseObj));
        }
        // API wiring: create employment via API.
        const empObj = {
            employmentId: `E-${new Date().getFullYear()}-${String(employments.length+1).padStart(3,"0")}`,
            buyerId: newBuyerId,
            empType: document.getElementById("regEmpType").value,
            empName: document.getElementById("regEmpName").value,
            empAddress: document.getElementById("regEmpAddress").value,
            empTelNum: document.getElementById("regEmpTel").value,
            empEmailAdd: document.getElementById("regEmpEmail").value,
            occupation: document.getElementById("regOccupation").value,
            position: document.getElementById("regPosition").value,
            tenure: parseInt(document.getElementById("regTenure").value || 0),
            occupationRank: document.getElementById("regOccRank").value
        };
        await API.send("POST", "/api/employment", mapEmploymentToDb(empObj));
        await loadAllData();
        showMessage(`Account created! Log in with Buyer ID ${newBuyerId} and your last name.`, "success");
        renderLoginPageAndAttach();
    }

    };
    window.updateProperty = (unitId) => {
        const index = properties.findIndex(p => p.unitId === unitId);
        if (index === -1) return;
        const reservedFor = document.getElementById("editReservedFor").value;
        const status = document.getElementById("editStatus").value;
        properties[index] = {
            ...properties[index],
            name: document.getElementById("editName").value,
            location: document.getElementById("editLocation").value,
            price: parseFloat(document.getElementById("editPrice").value || 0),
            status: status,
            reservedBy: reservedFor || null
        };
        refreshPropertyTable();
        closeModal();
        showMessage("Property updated");
    };
    window.deleteProperty = (unitId) => {
        if (confirm("Delete property?")) {
            properties = properties.filter(p => p.unitId !== unitId);
            refreshPropertyTable();
            showMessage("Property deleted");
        }
    };

    // REPORTS 
    function renderInventoryReports() {
        let totalSales = loans.reduce((s,l)=>s+(l.sellPrice||0),0);
        let outstanding = loans.filter(l=>l.status==="Active").reduce((s,l)=> {
            let paid = payments.filter(p=>p.loanId===l.loanId).reduce((sum,p)=>sum+p.amount,0);
            return s + ((l.loanAmount||0) - (l.downpayment||0) - paid);
        }, 0);
        return `<div class="card"><h2>📊 Reports</h2><p>💰 Total Sales: ₱${totalSales.toLocaleString()}</p><p>⚠️ Outstanding Payments: ₱${outstanding.toLocaleString()}</p></div>`;
    }

    // CLIENT DASHBOARD
    function renderAccountDetails(buyerId) { 
        if (!buyerId) return `<div class="card"><h2>My Account</h2><p>No buyer profile linked. Please contact admin to complete registration.</p></div>`;
        const b = buyers.find(b=>b.buyerId===buyerId); 
        return `<div class="card"><h2>My Account</h2><p><strong>Name:</strong> ${b?.fullName}</p><p><strong>Email:</strong> ${b?.personalEmail}</p><p><strong>Mobile:</strong> ${b?.mobileNum}</p><p><strong>Income:</strong> ₱${b?.grossMonthlyIncome.toLocaleString()}</p></div>`; 
    }
    function renderPropertyInfo(buyerId) {
        if (!buyerId) return `<div class="card"><h2>My Property</h2><p>No buyer profile – cannot reserve property.</p></div>`;
        let prop = properties.find(p => p.reservedBy === buyerId);
        if (!prop) {
            const loan = loans.find(l => l.buyerId === buyerId);
            if (loan) prop = properties.find(p => p.unitId === loan.unitId);
        }
        if (prop) {
            return `<div class="card"><h2>My Property</h2><p><strong>${prop.name}</strong> (${prop.location})</p><p>Price: ₱${prop.price.toLocaleString()}</p><p>Status: ${prop.status}</p></div>`;
        } else {
            return `<div class="card"><h2>My Property</h2><p>No property reserved yet. Contact admin.</p></div>`;
        }
    }
    function renderLoanDetails(buyerId) {
        if (!buyerId) return `<div class="card"><h2>Loan Details</h2><p>No buyer profile – cannot apply for loan.</p></div>`;
        let currentLoan = loans.find(l => l.buyerId === buyerId && (l.status === "Pending" || l.status === "Active"));
        if (currentLoan) {
            const paid = payments.filter(p=>p.loanId===currentLoan.loanId).reduce((sum,p)=>sum+p.amount,0);
            const remaining = currentLoan.loanAmount - (currentLoan.downpayment||0) - paid;
            const monthly = currentLoan.loanAmount / (currentLoan.loanTerm * 12);
            return `<div class="card"><h2>Loan Details</h2>
                <p><strong>Loan ID:</strong> ${currentLoan.loanId}</p>
                <p><strong>Amount:</strong> ₱${currentLoan.loanAmount.toLocaleString()}</p>
                <p><strong>Downpayment:</strong> ₱${currentLoan.downpayment.toLocaleString()}</p>
                <p><strong>Reservation Fee:</strong> ₱${currentLoan.reservationFee?.toLocaleString() || 0}</p>
                <p><strong>Processing Fee:</strong> ₱${currentLoan.processingFee?.toLocaleString() || 0}</p>
                <p><strong>Booking Officer:</strong> ${currentLoan.bookingOfficer || "Not assigned"}</p>
                <p><strong>Remaining Balance:</strong> ₱${remaining.toLocaleString()}</p>
                <p><strong>Monthly Payment (est.):</strong> ₱${monthly.toFixed(2)}</p>
                <p><strong>Status:</strong> ${currentLoan.status}</p>
                ${currentLoan.status === 'Active' ? `<button onclick="showMakePaymentModal('${currentLoan.loanId}')">Make Payment</button>` : ''}
            </div>`;
        }
        let anyLoan = loans.find(l => l.buyerId === buyerId);
        if (anyLoan) {
            return `<div class="card"><h2>Loan Details (Previous Loan)</h2>
                <p><strong>Loan ID:</strong> ${anyLoan.loanId}</p>
                <p><strong>Amount:</strong> ₱${anyLoan.loanAmount.toLocaleString()}</p>
                <p><strong>Status:</strong> ${anyLoan.status}</p>
                <p><strong>Booking Officer:</strong> ${anyLoan.bookingOfficer || "Not assigned"}</p>
                <hr>
                <p>You can apply for a new loan now.</p>
                <button onclick="showApplyLoanModal()">Apply for New Loan</button>
            </div>`;
        }
        return `<div class="card"><h2>Loan Details</h2><p>You don't have any loan application.</p><button onclick="showApplyLoanModal()">Apply for Loan</button></div>`;
    }
    function renderPaymentHistory(buyerId) {
        if (!buyerId) return `<div class="card"><h2>Payment History</h2><p>No buyer profile.</p></div>`;
        const loan = loans.find(l=>l.buyerId===buyerId);
        if(!loan) return `<div class="card"><h2>Payment History</h2><p>No loan found.</p></div>`;
        const myPayments = payments.filter(p=>p.loanId===loan.loanId).sort((a,b)=>new Date(b.date)-new Date(a.date));
        return `<div class="card"><h2>Payment History</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Remaining Balance</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${myPayments.map(p=>`<tr><td>${p.date}</td><td>₱${p.amount.toLocaleString()}</td><td>₱${p.remainingBalance.toLocaleString()}</td></tr>`).join('') || '<tr><td colspan="3">No payments yet</td></tr>'}
                    </tbody>
                </table>
            </div>
        </div>`;
    }
    function renderBeneficiaries(buyerId) { 
        if (!buyerId) return `<div class="card"><h2>Beneficiaries</h2><p>No buyer profile.</p></div>`;
        const myBens = beneficiaries.filter(b=>b.buyerId===buyerId); 
        // API wiring: pass BOTH the BeneficiaryID and the name to delete, because the
        // beneficiary table has a composite PK (BeneficiaryID, BenF_Name).
        return `<div class="card"><h2>Beneficiaries</h2><button onclick="addBeneficiary('${buyerId}')">+ Add</button><ul>${myBens.map(b=>`<li>${b.benFName} (${b.relationship}) <button class="btn-danger" onclick="removeBeneficiary('${b.beneficiaryId}', '${(b.benFName||'').replace(/'/g,"\\'")}')">Delete</button></li>`).join("")}</ul></div>`;
    }
    // API wiring: create a beneficiary via POST /api/beneficiaries, then reload + re-render.
    window.addBeneficiary = async (buyerId) => {
        let name=prompt("Full name"); let rel=prompt("Relationship");
        if(name&&rel){
            const ben = { beneficiaryId:`BEN-${Date.now()}`, buyerId, benFName:name.slice(0,50), benFBdate:new Date().toISOString().slice(0,10), relationship:rel.slice(0,20) };
            const res = await API.send("POST", "/api/beneficiaries", mapBeneficiaryToDb(ben));
            if (!res || !res.ok) { showMessage((res && res.error) || "Could not add beneficiary", "error"); return; }
            await loadAllData();
            switchPage("beneficiaries");
        }
    };
    // API wiring: delete via the query-param /one route (composite PK id + name), then reload.
    window.removeBeneficiary = async (id, name) => {
        const res = await API.send("DELETE", `/api/beneficiaries/one?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}`);
        if (!res || !res.ok) { showMessage((res && res.error) || "Could not delete beneficiary", "error"); return; }
        await loadAllData();
        switchPage("beneficiaries");
    };

    // CLIENT APPLY FOR LOAN
    window.showApplyLoanModal = () => {
        let availableProps = properties.filter(p => p.status !== "Sold");
        if (availableProps.length === 0) {
            showMessage("No properties available for loan application at this time.", "error");
            return;
        }
        const financeOptions = ['Bank','In-House','Pag-IBIG','Cash','Others'];
        const purposeOptions = ['Primary Home','Vacation','Retirement','Investment','Others'];
        const sourceOptions = ['Employment','Business','Inheritance','Remittance','Others'];
        const propertyOptions = availableProps.map(p => `<option value="${p.unitId}" data-price="${p.price}">${p.name} (${p.location}) - ₱${p.price.toLocaleString()}</option>`).join('');
        const formHtml = `
            <h3>📝 Apply for Loan</h3>
            <form id="applyLoanForm">
                <div class="form-group"><label>Select Property *</label><select id="applyPropertyId">${propertyOptions}</select></div>
                <div class="form-group"><label>Selling Price (for reference)</label><input type="text" id="applySellPriceDisplay" readonly style="background:#f3f4f6;"></div>
                <div class="form-group"><label>Loan Amount *</label><input type="text" data-numeric-decimal="true" id="applyLoanAmount" required></div>
                <div class="form-group"><label>Downpayment *</label><input type="text" data-numeric-decimal="true" id="applyDownpayment" required></div>
                <div class="form-group"><label>DP Term (months)</label><input data-numeric="true" id="applyDpTerm" value="24"></div>
                <div class="form-group"><label>Loan Term (years) *</label><input data-numeric="true" id="applyLoanTerm" value="10" required></div>
                <div class="form-group"><label>Finance Type</label><select id="applyFinanceType">${financeOptions.map(f=>`<option>${f}</option>`).join('')}</select></div>
                <div class="form-group"><label>Purchase Purpose</label><select id="applyPurpose">${purposeOptions.map(p=>`<option>${p}</option>`).join('')}</select></div>
                <div class="form-group"><label>Source of Funds</label><select id="applySource">${sourceOptions.map(s=>`<option>${s}</option>`).join('')}</select></div>
            </form>
            <div class="modal-buttons"><button onclick="submitLoanApplication()">Submit Application</button><button class="btn-secondary" onclick="closeModal()">Cancel</button></div>
        `;
        openModal(formHtml);
        const propSelect = document.getElementById("applyPropertyId");
        const sellPriceField = document.getElementById("applySellPriceDisplay");
        const updateSellPrice = () => {
            const selected = propSelect.options[propSelect.selectedIndex];
            const price = selected.getAttribute("data-price");
            sellPriceField.value = price ? `₱${parseFloat(price).toLocaleString()}` : "";
        };
        propSelect.addEventListener("change", updateSellPrice);
        updateSellPrice();
    };
    window.submitLoanApplication = async () => {
        const propSelect = document.getElementById("applyPropertyId");
        const selectedOption = propSelect.options[propSelect.selectedIndex];
        const unitId = selectedOption.value;
        const sellingPrice = parseFloat(selectedOption.getAttribute("data-price") || 0);
        const loanAmount = parseFloat(document.getElementById("applyLoanAmount").value || 0);
        const downpayment = parseFloat(document.getElementById("applyDownpayment").value || 0);
        const dpTerm = parseInt(document.getElementById("applyDpTerm").value || 0);
        const loanTerm = parseInt(document.getElementById("applyLoanTerm").value || 0);
        const financeType = document.getElementById("applyFinanceType").value;
        const purchasePurpose = document.getElementById("applyPurpose").value;
        const sourceFunds = document.getElementById("applySource").value;
        const buyerId = currentUser.buyerId;
        if (!buyerId) { showMessage("No buyer profile linked. Please contact admin.", "error"); return; }
        if (!unitId) { showMessage("Please select a property", "error"); return; }
        if (!loanAmount || !downpayment) { showMessage("Please fill all required fields", "error"); return; }
        const existingLoan = loans.find(l => l.buyerId === buyerId && (l.status === "Pending" || l.status === "Active"));
        if (existingLoan) {
            showMessage("You already have an active or pending loan. Please complete it before applying for a new one.", "error");
            return;
        }
        const newId = `L-${Math.floor(Math.random()*90000+10000)}`;
        const newLoan = {
            loanId: newId,
            buyerId: buyerId,
            unitId: unitId,
            financeType: financeType,
            dpTerm: dpTerm,
            loanTerm: loanTerm,
            purchasePurpose: purchasePurpose,
            loanAmount: loanAmount,
            downpayment: downpayment,
            reservationFee: 0,
            processingFee: 0,
            sellPrice: sellingPrice,
            orPrNum: "APPLIED",
            orPrDate: new Date().toISOString().slice(0,10),
            bookingOfficer: "Pending Assignment",
            sourceFunds: sourceFunds,
            status: "Pending"
        };
        // API wiring: POST the loan application to the DB (status not persisted, no
        // DB column). Reload so the new loan appears, then go to loan details.
        const res = await API.send("POST", "/api/loans", mapLoanToDb(newLoan));
        if (!res || !res.ok) { showMessage((res && res.error) || "Could not submit application", "error"); return; }
        await loadAllData();
        closeModal();
        showMessage("Loan application submitted. Waiting for admin approval.");
        switchPage("loanDetails");
    };
    window.showMakePaymentModal = (loanId) => {
        const loan = loans.find(l=>l.loanId===loanId);
        const paid = payments.filter(p=>p.loanId===loanId).reduce((sum,p)=>sum+p.amount,0);
        const remaining = loan.loanAmount - (loan.downpayment||0) - paid;
        if(remaining <= 0) { showMessage("Loan already fully paid","error"); return; }
        const formHtml = `
            <h3>💰 Make Payment</h3>
            <form id="paymentForm">
                <div class="form-group"><label>Amount to Pay *</label><input type="text" data-numeric-decimal="true" id="paymentAmount" required></div>
                <div class="form-group"><label>Remaining Balance (before payment)</label><input type="text" value="₱${remaining.toLocaleString()}" disabled></div>
            </form>
            <div class="modal-buttons"><button onclick="recordPayment('${loanId}')">Pay</button><button class="btn-secondary" onclick="closeModal()">Cancel</button></div>
        `;
        openModal(formHtml);
    };
    window.recordPayment = (loanId) => {
        const amount = parseFloat(document.getElementById("paymentAmount").value||0);
        const loan = loans.find(l=>l.loanId===loanId);
        const paid = payments.filter(p=>p.loanId===loanId).reduce((sum,p)=>sum+p.amount,0);
        const remainingBefore = loan.loanAmount - (loan.downpayment||0) - paid;
        if(amount <= 0 || amount > remainingBefore) { showMessage("Invalid payment amount","error"); return; }
        const newRemaining = remainingBefore - amount;
        payments.push({ paymentId: `PAY-${Date.now()}`, loanId, amount, date: new Date().toISOString().slice(0,10), remainingBalance: newRemaining });
        if (newRemaining <= 0) {
            loan.status = "Paid";
            showMessage("Congratulations! Your loan is fully paid.", "success");
            refreshLoanTable();
        } else {
            showMessage("Payment recorded successfully");
        }
        closeModal();
        switchPage("loanDetails");
    };

    renderApp();
    setInterval(() => {
        if(document.getElementById("clientTableBody")) refreshClientTable();
        if(document.getElementById("loanTableBody")) refreshLoanTable();
        if(document.getElementById("propTableBody")) refreshPropertyTable();
    }, 500);

    const STATUS_KEYS = new Set(['active','pending','rejected','paid','available','reserved','sold']);
    function applyStatusBadges() {
        document.querySelectorAll('td').forEach(td => {
            if (td.querySelector('.badge, button')) return;
            const key = td.textContent.trim().toLowerCase();
            if (STATUS_KEYS.has(key)) {
                td.innerHTML = `<span class="badge badge-${key}">${td.textContent.trim()}</span>`;
            }
        });
    }
    document.getElementById('navButtons').addEventListener('click', e => {
        const btn = e.target.closest('.nav-btn[data-page]');
        if (!btn) return;
        document.querySelectorAll('.nav-btn[data-page]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
    const _obs = new MutationObserver(() => applyStatusBadges());
    function watchPageContainer() {
        const pc = document.getElementById('pageContainer');
        if (pc && !pc._observed) {
            _obs.observe(pc, { childList: true, subtree: true });
            pc._observed = true;
            applyStatusBadges();
        }
    }
    const mainObs = new MutationObserver(watchPageContainer);
    mainObs.observe(document.getElementById('mainContent'), { childList: true });
    watchPageContainer();
</script>
</body>
</html>
